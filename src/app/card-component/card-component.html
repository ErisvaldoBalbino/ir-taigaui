<div style="padding: 2rem; border-radius: 1rem; border: 1px solid var(--tui-border-normal); background-color: var(--tui-background-base); box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
  <h2 tuiTitle>
    {{ titulo() }}
    <span tuiSubtitle>{{ descricao() }}</span>
  </h2>
  
  <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
    @for (option of options(); track option.label) {
      <div style="border-radius: 0.5rem; border: 1px solid var(--tui-border-normal); padding: 1rem; background-color: var(--tui-background-neutral-1); cursor: pointer;" (click)="votar(option)">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; user-select: none;">
          <h3 tuiTitle style="margin: 0;">{{ option.label }}</h3>
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span tuiBadge>{{ option.votes }} votos</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
