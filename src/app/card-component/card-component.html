<div appearance="floating" tuiCardLarge>
  <header tuiHeader>
    <h2 tuiTitle>
      {{ titulo() }}
      <span tuiSubtitle>{{ descricao() }}</span>
    </h2>
  </header>
  
  <section class="options-list">
    @for (option of options(); track option.label) {
      <div class="option-item" (click)="votar(option)">
        <div class="option-content">
          <h3 tuiTitle class="option-title">{{ option.label }}</h3>
          <div class="votes-badge">
            <span tuiBadge>{{ option.votes }} votos</span>
          </div>
        </div>
      </div>
    }
  </section>
</div>
