<tui-root [attr.tuiTheme]="darkMode() ? 'dark' : null">
    <div style="position: fixed; top: 1rem; right: 1rem;">
        <button
            tuiButton
            appearance="secondary"
            size="m"
            (click)="darkMode.set(!darkMode())"
        >
            <tui-icon [icon]="darkMode() ? '@tui.sun' : '@tui.moon'" style="margin-right: 0.5rem;"></tui-icon>
            {{ darkMode() ? 'Modo Claro' : 'Modo Escuro' }}
        </button>
    </div>

    <div style="padding-top: 1rem; min-height: 100vh;">
        <app-main-polls-component style="width: 100%;"></app-main-polls-component>
    </div>
</tui-root>
